<div id="toolbar" class="toolbar hidden">
  <div class="toolbar-context">
    <div class="pill-host" id="pill-ai-tool">
      <button type="button" class="toolbar-pill" id="btn-pill-ai-tool" aria-haspopup="listbox" aria-label="Select AI tool">
        <span class="pill-label" id="pill-ai-tool-label">OpenCode</span>
        <svg class="pill-chevron" width="8" height="5" viewBox="0 0 8 5" fill="none" aria-hidden="true"><path d="M1 1l3 3 3-3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="pill-dropdown hidden" id="dropdown-ai-tool" role="listbox"></div>
    </div>
  </div>
  <div class="toolbar-controls">
  </div>
  <div class="toolbar-right">
    <button
      type="button"
      id="btn-toggle-editor-attachment"
      class="toolbar-btn"
      aria-label="Toggle editor mode"
      title="{{t:toggleEditor}}"
    >
      ↗
    </button>
    <button
      type="button"
      id="btn-restart"
      class="toolbar-btn"
      aria-label="Restart terminal"
      title="{{t:restart}}"
    >
      &#x21BB;
    </button>
    <div class="settings-host">
      <button
        type="button"
        id="btn-settings"
        class="toolbar-btn"
        aria-label="Open extension settings"
        title="{{t:settings}}"
      >
        &#x2699;
      </button>
      <div class="settings-dropdown hidden" id="dropdown-settings" role="menu">
        <div class="settings-option" role="menuitem" data-action="keyboardShortcuts">
          &#x2328;&#xFE0E; {{t:keybindSettings}}
        </div>
        <div class="settings-option" role="menuitem" data-action="settings">
          &#x2699;&#xFE0E; {{t:extensionSettings}}
        </div>
      </div>
    </div>
  </div>
</div>
