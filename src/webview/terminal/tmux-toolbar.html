<div id="tmux-toolbar" class="tmux-toolbar hidden">
  <div class="toolbar-context">
    <div class="pill-host" id="pill-ai-tool">
      <button type="button" class="toolbar-pill" id="btn-pill-ai-tool" aria-haspopup="listbox" aria-label="Select AI tool">
        <span class="pill-label" id="pill-ai-tool-label">OpenCode</span>
        <svg class="pill-chevron" width="8" height="5" viewBox="0 0 8 5" fill="none" aria-hidden="true"><path d="M1 1l3 3 3-3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="pill-dropdown hidden" id="dropdown-ai-tool" role="listbox"></div>
    </div>
    <span class="pill-separator">·</span>
    <div class="pill-host" id="pill-backend">
      <button type="button" class="toolbar-pill" id="btn-pill-backend" aria-haspopup="listbox" aria-label="Select terminal backend">
        <span class="pill-label" id="pill-backend-label">Native Shell</span>
        <svg class="pill-chevron" width="8" height="5" viewBox="0 0 8 5" fill="none" aria-hidden="true"><path d="M1 1l3 3 3-3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="pill-dropdown hidden" id="dropdown-backend" role="listbox"></div>
    </div>
  </div>
  <div class="toolbar-controls">
    <div class="tmux-window-controls" data-tmux-window-controls>
      <button
        type="button"
        id="btn-tmux-new-session"
        class="tmux-btn tmux-btn--primary"
        aria-label="Create tmux session"
        title="{{t:newSession}}"
      >
        +S
      </button>
      <button
        type="button"
        id="btn-tmux-prev-window"
        class="tmux-btn"
        aria-label="Previous tmux window"
        title="{{t:prevWindow}}"
      >
        ‹
      </button>
      <button
        type="button"
        id="btn-tmux-new-window"
        class="tmux-btn tmux-btn--primary"
        aria-label="Create tmux window"
        title="{{t:newWindow}}"
      >
        +W
      </button>
      <button
        type="button"
        id="btn-tmux-next-window"
        class="tmux-btn"
        aria-label="Next tmux window"
        title="{{t:nextWindow}}"
      >
        ›
      </button>
    </div>
    <div class="tmux-command-menu">
      <button
        type="button"
        id="btn-tmux-commands"
        class="pane-btn"
        aria-label="Tmux commands"
        title="{{t:tmuxCommands}}"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 14 14"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            d="M2 4h10M2 7h10M2 10h10"
            stroke="currentColor"
            stroke-width="1.2"
            stroke-linecap="round"
          />
        </svg>
      </button>
      <div id="tmux-command-dropdown" class="tmux-cmd-dropdown hidden">
        <div class="tmux-cmd-search">
          <input
            type="text"
            id="tmux-cmd-search-input"
            class="tmux-cmd-search-input"
            placeholder="Search tmux commands"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div id="tmux-command-list" class="tmux-cmd-list"></div>
        <div class="tmux-cmd-hint">
          ↑↓ Navigate · Enter Select · Esc Dismiss
        </div>
      </div>
    </div>
  </div>
  <div class="toolbar-right">
    <button
      type="button"
      id="btn-toggle-editor-attachment"
      class="tmux-btn"
      aria-label="Toggle editor mode"
      title="{{t:toggleEditor}}"
    >
      ↗
    </button>
    <button
      type="button"
      id="btn-rerender"
      class="tmux-btn"
      aria-label="Refresh terminal"
      title="{{t:rerender}}"
    >
      &#x25A3;
    </button>
    <button
      type="button"
      id="btn-restart"
      class="tmux-btn"
      aria-label="Restart terminal"
      title="{{t:restart}}"
    >
      &#x21BB;
    </button>
    <button
      type="button"
      id="btn-settings"
      class="tmux-btn"
      aria-label="Open extension settings"
      title="{{t:settings}}"
    >
      &#x2699;
    </button>
  </div>
</div>
