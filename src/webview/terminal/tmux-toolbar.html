<div id="tmux-toolbar" class="tmux-toolbar hidden">
  <span id="tmux-session-label" class="tmux-session-label"></span>
  <div class="toolbar-controls">
    <div class="tmux-window-controls" data-tmux-window-controls>
      <button
        type="button"
        id="btn-tmux-new-session"
        class="tmux-btn tmux-btn--primary"
        aria-label="Create tmux session"
        title="New tmux session"
      >
        +S
      </button>
      <button
        type="button"
        id="btn-tmux-prev-window"
        class="tmux-btn"
        aria-label="Previous tmux window"
        title="Previous tmux window"
      >
        ‹
      </button>
      <button
        type="button"
        id="btn-tmux-new-window"
        class="tmux-btn tmux-btn--primary"
        aria-label="Create tmux window"
        title="New tmux window"
      >
        +W
      </button>
      <button
        type="button"
        id="btn-tmux-next-window"
        class="tmux-btn"
        aria-label="Next tmux window"
        title="Next tmux window"
      >
        ›
      </button>
    </div>
    <div class="tmux-command-menu">
      <button
        type="button"
        id="btn-tmux-commands"
        class="pane-btn"
        aria-label="Tmux commands"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 14 14"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            d="M2 4h10M2 7h10M2 10h10"
            stroke="currentColor"
            stroke-width="1.2"
            stroke-linecap="round"
          />
        </svg>
      </button>
      <div id="tmux-command-dropdown" class="tmux-cmd-dropdown hidden">
        <div class="tmux-cmd-search">
          <input
            type="text"
            id="tmux-cmd-search-input"
            class="tmux-cmd-search-input"
            placeholder="Search tmux commands"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div id="tmux-command-list" class="tmux-cmd-list"></div>
        <div class="tmux-cmd-hint">
          ↑↓ Navigate · Enter Select · Esc Dismiss
        </div>
      </div>
    </div>
  </div>
  <div class="toolbar-right">
    <button
      type="button"
      id="btn-toggle-backend"
      class="tmux-btn"
      aria-label="Toggle backend mode"
      title="Switch to Native Shell"
    >
      &#x21C4;
    </button>
    <button
      type="button"
      id="btn-toggle-editor-attachment"
      class="tmux-btn"
      aria-label="Toggle editor mode"
    >
      ↗
    </button>
    <button
      type="button"
      id="btn-restart"
      class="tmux-btn"
      aria-label="Restart terminal"
    >
      &#x21BB;
    </button>
  </div>
</div>
